<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>아이디어 게시판 | Appter</title>
  <link rel="icon" type="image/png" href="images/logo_favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="page-board">
  <header id="site-header">
    <div class="header-inner">
      <a href="/" class="logo"><img src="images/logo_text_white.png" alt="Appter" width="175"></a>
      <nav class="primary-nav">
        <a href="/" class="nav-link">홈</a>
        <a href="board.html" class="nav-link active">아이디어 게시판</a>
      
        <a href="admin.html" class="nav-link nav-admin-only" data-admin-only>관리자</a></nav>
      <div id="auth-area">
        <button id="login-btn" class="btn-login" onclick="window.appAuth.loginWithGoogle()">
          <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
          Google로 로그인
        </button>
        <div id="user-info" class="hidden">
          <img id="user-photo" src="" alt="" class="user-avatar">
          <span id="user-name"></span>
          <button id="logout-btn" class="btn-logout" onclick="window.appAuth.logout()">로그아웃</button>
        </div>
      </div>
    </div>
  </header>

  <div id="toast-container"></div>

  <main class="board-main">
    <div class="board-head">
      <h1>아이디어 게시판</h1>
      <p class="board-sub">전체 아이디어를 진행 단계별로 모아 봤어요. 카드를 클릭하면 상세 페이지로 이동합니다.</p>
    </div>

    <div class="board-tabs" role="tablist">
      <button class="board-tab" data-tab="ready">필요인원 채운 아이디어</button>
      <button class="board-tab" data-tab="building">제작 중인 앱</button>
      <button class="board-tab active" data-tab="waiting">대기 중</button>
      <button class="board-tab" data-tab="cancelled">취소된 아이디어</button>
    </div>

    <div id="board-list" class="board-list"></div>
  </main>

  <footer id="site-footer">
    <p>&copy; 2026 Appter. All rights reserved.</p>
  </footer>

  <script type="module" src="js/firebase-config.js"></script>
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/firestore.js"></script>
  <script type="module" src="js/analytics.js"></script>
  <script type="module" src="js/access-guard.js"></script>
  <script type="module" src="js/board.js"></script>
</body>
</html>
