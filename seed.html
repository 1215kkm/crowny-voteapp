function pickRandom(arr, n) {
  const copy = [...arr]; const res = [];
  for (let i = 0; i < Math.min(n, copy.length); i++) {
    const idx = Math.floor(Math.random() * copy.length);
    res.push(copy.splice(idx, 1)[0]);

// ---- Seed Function ----
async function seedAll() {
  log("=== 시딩 시작 ===");
  const now = Timestamp.fromDate(new Date());
  let totalMembers = 0;

  for (let i = 0; i < IDEAS.length; i++) {
    const idea = IDEAS[i];
    const author = AUTHORS[idea.a];
    const createdAt = daysAgo(idea.days, Math.random()*12);

    // Create idea doc
    const ideaRef = doc(collection(db, "ideas"));
    const batch = writeBatch(db);

    batch.set(ideaRef, {
      title: idea.title,
      description: idea.desc,
      authorUid: author.uid,
      authorName: author.name,
      authorPhoto: avatar(author.name, author.bg),
      waitlistCount: idea.wl,
      createdAt: createdAt
    });

    // Add waitlist members
    if (idea.wl > 0) {
      const members = pickRandom(POOL, idea.wl);
      for (const m of members) {
        const mRef = doc(db, "ideas", ideaRef.id, "waitlist", m.uid);
        batch.set(mRef, {
          displayName: m.name,
          email: m.uid + "@example.com",
          photoURL: avatar(m.name),
          joinedAt: randBetween(createdAt, now)
        });
      }
      totalMembers += idea.wl;
    }

    await batch.commit();
    log("[" + (i+1) + "/24] " + idea.title + " (대기자 " + idea.wl + "명)");
  }

  log("\n=== 완료! ===");
  log("아이디어: 24개 / 대기자 합계: " + totalMembers + "명");
  log("index.html을 새로고침해서 확인하세요!");
}

// ---- Clear Function ----
async function clearAll() {
  log("=== 기존 데이터 삭제 중 ===");
  const ideasSnap = await getDocs(collection(db, "ideas"));
  let count = 0;

  for (const ideaDoc of ideasSnap.docs) {
    // Delete waitlist subcollection
    const wlSnap = await getDocs(collection(db, "ideas", ideaDoc.id, "waitlist"));
    const batch = writeBatch(db);
    wlSnap.forEach(d => batch.delete(d.ref));
    batch.delete(ideaDoc.ref);
    await batch.commit();
    count++;
    log("삭제: " + (ideaDoc.data().title || ideaDoc.id));
  }

  log("=== " + count + "개 아이디어 삭제 완료 ===\n");
}

window._seed = seedAll;
window._clear = clearAll;
